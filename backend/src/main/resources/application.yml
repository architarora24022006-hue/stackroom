server:
  port: ${PORT:8080}

spring:
  application:
    name: ragqa-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ragqa}
    username: ${DB_USER:ragqa}
    password: ${DB_PASSWORD:ragqa}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-string-in-production-please}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    embedding-model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
    chat-model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  rag:
    chunk-size-chars: 1200
    chunk-overlap-chars: 200
    top-k: 5
